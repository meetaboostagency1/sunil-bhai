<title>TRADE WITH SUNIL™</title>

<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;700&family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Oxanium',sans-serif;
    background:url('https://i.ibb.co/7x4vqZqd/image.jpg') no-repeat center center;
    background-size:cover;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.glass-box{
    width:95%;
    max-width:650px;
    background:rgba(0,0,0,0.55);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.18);
    border-radius:24px;
    padding:50px 30px;
    text-align:center;
}

.logo-img{
    width:180px;
    height:180px;
    object-fit:cover;
    border-radius:50%;
    border:4px solid #ffdb4d;
    box-shadow:0 0 25px #ffdb4d;
    margin-bottom:22px;
}

.title{
    font-size:46px;
    font-weight:700;
    color:#ffdb4d;
    text-shadow:0 0 15px #ffdb4d;
    margin-bottom:10px;
}

.sub-title{
    font-size:24px;
    color:#ffe26f;
    margin-bottom:30px;
    text-shadow:0 0 8px #000;
}

.join-btn{
    display:block;
    width:100%;
    padding:20px 0;
    background:linear-gradient(90deg,#0088cc,#00a8ff);
    color:#fff;
    text-decoration:none;
    border-radius:14px;
    font-size:22px;
    font-weight:700;
    box-shadow:0 0 15px #00a8ff;
    margin-bottom:25px;
    animation:pulse 1.7s infinite;
    transition:.3s;
}

.join-btn:hover{
    transform:scale(1.03);
    box-shadow:0 0 25px #00c2ff;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(.95);}
    100%{transform:scale(1);}
}

.highlight{
    display:inline-block;
    color:#ffdb4d;
    border:1px solid #ffdb4d;
    padding:10px 18px;
    border-radius:8px;
    font-size:18px;
    margin:15px 0 25px;
    box-shadow:0 0 12px rgba(255,219,77,.4);
}

p{
    color:#fff;
    font-size:20px;
    margin:10px 0;
    text-shadow:0 0 8px #000;
}

footer{
    margin-top:20px;
    color:#ccc;
    font-size:14px;
}

.ads-box{
    margin-top:25px;
    display:inline-block;
    background:linear-gradient(135deg,#4f46e5,#9333ea,#ec4899);
    padding:10px 16px;
    border-radius:12px;
    color:#fff;
    font-size:14px;
    font-family:'Poppins',sans-serif;
    border:1px solid rgba(255,255,255,.2);
    animation:glow 2s infinite alternate;
}

.ads-box a{
    color:#6cb6ff;
    text-decoration:none;
    font-weight:700;
    margin:0 4px;
    text-shadow:0 0 6px #6cb6ff;
}

@keyframes glow{
    from{
        box-shadow:0 0 8px #9333ea;
    }
    to{
        box-shadow:0 0 16px #ec4899;
    }
}

/* Mobile Full Size */
@media(max-width:768px){

    .glass-box{
        width:100%;
        padding:45px 20px;
    }

    .logo-img{
        width:170px;
        height:170px;
    }

    .title{
        font-size:42px;
    }

    .sub-title{
        font-size:22px;
    }

    .join-btn{
        font-size:22px;
        padding:20px 0;
    }

    p{
        font-size:19px;
    }

    .highlight{
        font-size:17px;
    }
}
</style>
</head>

<div class="glass-box">

    <img
        src="https://i.ibb.co/ZzJqy0Xj/Mn4p-LX4-o-L4kt-K46e4q-DGzp-A3d-QWLbc20-MTh-OMem-Xqx-B-z2w-DCQi-Ks-SVtpm-Nlx973fyu5-Y2-Yl-Ms-GAPxvv-Vrr.jpg"

    <a href="https://telegram.me/+V8YMfszGDks0NmNl" class="join-btn">

    <div class="highlight">
